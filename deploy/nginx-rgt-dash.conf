# nginx reverse proxy for the RGT dashboard (gunicorn on 127.0.0.1:8050).
# Pick ONE pattern.

# ── (A) SUBPATH — https://ifc.nkn.uidaho.edu/dashapp/  (THIS IS YOUR SETUP) ──
#     Replaces the older dashboard served at the same /dashapp/ URL.
#     Requires  Environment=RGT_URL_PREFIX=/dashapp/  in rgt-dash.service (already set).
#     Paste this location block INSIDE the existing ifc.nkn.uidaho.edu server {} :
location /dashapp/ {
    proxy_pass         http://127.0.0.1:8050;     # no trailing path → keeps /dashapp/ prefix
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;            # long report builds
    proxy_send_timeout 300s;
}

